<mat-toolbar class="header">
  <div class="header__inner">
    <a class="brand" routerLink="/" (click)="closeMenu()">
      <mat-icon class="brand__icon brand__icon--flame">thermostat</mat-icon>
      <span class="brand__name">Thermion</span>
    </a>

    <nav class="nav nav--desktop">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="nav__link"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="header__actions">
      <a href="tel:+919629599253" class="phone-link">
        <mat-icon>call</mat-icon>
        <span>+91 96295 99253</span>
      </a>
      <a mat-flat-button routerLink="/contact" class="nav__cta btn-orange">
        Schedule Service
      </a>
    </div>

    <button
      class="nav__toggle"
      mat-icon-button
      type="button"
      aria-label="Toggle navigation menu"
      (click)="toggleMenu()"
    >
      <mat-icon>{{ menuOpen() ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>

  @if (menuOpen()) {
    <nav class="nav nav--mobile">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="nav__link"
          (click)="closeMenu()"
        >
          {{ link.label }}
        </a>
      }
      <a href="tel:+919629599253" class="phone-link phone-link--mobile">
        <mat-icon>call</mat-icon>
        <span>+91 96295 99253</span>
      </a>
      <a mat-flat-button routerLink="/contact" class="btn-orange" (click)="closeMenu()">
        Schedule Service
      </a>
    </nav>
  }
</mat-toolbar>
